<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Math OCR to LaTeX</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f4ed;
        --panel: #fffdf8;
        --ink: #202124;
        --muted: #6f675b;
        --line: #ddd3c4;
        --accent: #226b5f;
        --accent-strong: #174d44;
        --danger: #9d2d20;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top left, #e3f0ea, transparent 34rem), var(--bg);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1080px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      header {
        margin-bottom: 28px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 4vw, 3.8rem);
        letter-spacing: -0.05em;
      }

      p {
        color: var(--muted);
        line-height: 1.6;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
        gap: 20px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 24px;
        background: color-mix(in srgb, var(--panel) 92%, white);
        box-shadow: 0 18px 48px rgb(55 43 24 / 10%);
        padding: 22px;
      }

      .toolbar,
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      input[type="file"] {
        width: 100%;
        border: 1px dashed var(--line);
        border-radius: 16px;
        background: white;
        padding: 14px;
      }

      canvas {
        width: 100%;
        height: 360px;
        display: block;
        margin: 16px 0;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: white;
        touch-action: none;
        cursor: crosshair;
      }

      button {
        border: 0;
        border-radius: 999px;
        background: var(--accent);
        color: white;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 12px 18px;
      }

      button.secondary {
        border: 1px solid var(--line);
        background: white;
        color: var(--ink);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 700;
      }

      .hint {
        margin-top: 8px;
        font-size: 0.94rem;
      }

      .math-editor {
        width: 100%;
        min-height: 120px;
        display: block;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: white;
        padding: 18px;
        overflow-x: auto;
        font-size: 1.4rem;
      }

      .math-editor:focus-within {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgb(34 107 95 / 15%);
      }

      .latex-source {
        width: 100%;
        min-height: 150px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: #171916;
        color: #f6f2e8;
        padding: 16px;
        font: 1rem/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      .section-label {
        margin-top: 16px;
      }

      .status {
        min-height: 24px;
        color: var(--muted);
      }

      .status.error {
        color: var(--danger);
      }

      @media (max-width: 820px) {
        main {
          padding: 28px 0;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Math OCR to LaTeX</h1>
        <p>이미지를 업로드하거나 아래 캔버스에 수식을 손으로 그리면 LaTeX 수식으로 변환합니다. 변환된 결과는 MathLive 편집기에서 바로 수정할 수 있습니다.</p>
      </header>

      <section class="grid">
        <div class="card">
          <label for="imageInput">이미지 업로드</label>
          <input id="imageInput" type="file" accept="image/*" />
          <p class="hint">업로드 파일이 있으면 업로드 이미지를 우선 사용합니다. 없으면 캔버스 그림을 보냅니다.</p>

          <canvas id="drawCanvas" width="1200" height="720" aria-label="수식 그리기 캔버스"></canvas>

          <div class="toolbar">
            <button id="clearCanvas" class="secondary" type="button">캔버스 지우기</button>
            <button id="convertCanvas" type="button">인식 후 편집하기</button>
          </div>
        </div>

        <div class="card">
          <label for="mathEditor">MathLive 편집기</label>
          <div id="mathEditorHost"></div>
          <p class="hint">이미지 인식 결과가 이 편집기에 들어옵니다. 수식을 클릭해서 직접 고치거나 아래 LaTeX 코드를 수정해도 됩니다.</p>

          <label class="section-label" for="latexInput">LaTeX 코드</label>
          <textarea id="latexInput" class="latex-source" spellcheck="false" aria-label="LaTeX 코드">\frac{1}{2}</textarea>

          <p id="status" class="status"></p>
          <div class="actions">
            <button id="copyResult" class="secondary" type="button">LaTeX 복사</button>
          </div>
        </div>
      </section>
    </main>

    <script type="module">
      const { MathfieldElement } = await import("https://esm.run/mathlive");
      MathfieldElement.fontsDirectory = "https://cdn.jsdelivr.net/npm/mathlive/fonts";

      const canvas = document.querySelector("#drawCanvas");
      const ctx = canvas.getContext("2d");
      const imageInput = document.querySelector("#imageInput");
      const mathEditorHost = document.querySelector("#mathEditorHost");
      const latexInput = document.querySelector("#latexInput");
      let mathEditor;
      const statusText = document.querySelector("#status");
      const convertButton = document.querySelector("#convertCanvas");
      const clearButton = document.querySelector("#clearCanvas");
      const copyButton = document.querySelector("#copyResult");

      let drawing = false;
      let hasDrawing = false;
      let syncingLatex = false;

      mathEditor = new MathfieldElement();
      mathEditor.id = "mathEditor";
      mathEditor.className = "math-editor";
      mathEditor.setAttribute("virtual-keyboard-mode", "manual");
      mathEditor.setAttribute("aria-label", "인식된 수식 편집기");
      mathEditorHost.replaceChildren(mathEditor);

      setLatex("\\frac{1}{2}");
      setStatus("이미지를 인식하거나 LaTeX를 직접 수정해보세요.");

      function resetCanvas() {
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.lineWidth = 8;
        ctx.strokeStyle = "#111111";
        hasDrawing = false;
      }

      function pointerPosition(event) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: ((event.clientX - rect.left) / rect.width) * canvas.width,
          y: ((event.clientY - rect.top) / rect.height) * canvas.height,
        };
      }

      canvas.addEventListener("pointerdown", (event) => {
        drawing = true;
        hasDrawing = true;
        const point = pointerPosition(event);
        ctx.beginPath();
        ctx.moveTo(point.x, point.y);
        canvas.setPointerCapture(event.pointerId);
      });

      canvas.addEventListener("pointermove", (event) => {
        if (!drawing) return;
        const point = pointerPosition(event);
        ctx.lineTo(point.x, point.y);
        ctx.stroke();
      });

      canvas.addEventListener("pointerup", () => {
        drawing = false;
      });

      canvas.addEventListener("pointercancel", () => {
        drawing = false;
      });

      clearButton.addEventListener("click", () => {
        resetCanvas();
        imageInput.value = "";
        setStatus("캔버스를 지웠습니다.");
      });

      convertButton.addEventListener("click", async () => {
        setLoading(true);
        setStatus("이미지를 인식하는 중입니다...");

        const formData = new FormData();
        if (imageInput.files.length > 0) {
          formData.append("image", imageInput.files[0]);
        } else if (hasDrawing) {
          formData.append("image_data", canvas.toDataURL("image/png"));
        } else {
          setStatus("이미지를 업로드하거나 캔버스에 수식을 그려주세요.", true);
          setLoading(false);
          return;
        }

        try {
          const response = await fetch("/api/convert", {
            method: "POST",
            body: formData,
          });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.detail || "변환 요청이 실패했습니다.");
          }
          setLatex(stripMathDelimiters(data.latex));
          mathEditor.focus();
          setStatus("인식 완료. MathLive 편집기에서 바로 수정할 수 있습니다.");
        } catch (error) {
          setStatus(error.message, true);
        } finally {
          setLoading(false);
        }
      });

      mathEditor.addEventListener("input", () => {
        if (syncingLatex) return;
        syncingLatex = true;
        latexInput.value = mathEditor.getValue("latex-expanded");
        syncingLatex = false;
      });

      latexInput.addEventListener("input", () => {
        if (syncingLatex) return;
        setLatex(latexInput.value);
      });

      copyButton.addEventListener("click", async () => {
        await navigator.clipboard.writeText(latexInput.value.trim());
        setStatus("LaTeX 코드를 복사했습니다.");
      });

      function setLatex(latex) {
        const cleanLatex = stripMathDelimiters(latex);
        syncingLatex = true;
        mathEditor.value = cleanLatex;
        latexInput.value = cleanLatex;
        syncingLatex = false;
      }

      function stripMathDelimiters(latex) {
        const trimmed = latex.trim();
        const delimiterPairs = [
          ["$$", "$$"],
          ["\\[", "\\]"],
          ["\\(", "\\)"],
        ];

        for (const [start, end] of delimiterPairs) {
          if (trimmed.startsWith(start) && trimmed.endsWith(end)) {
            return trimmed.slice(start.length, -end.length).trim();
          }
        }

        return trimmed;
      }

      function setLoading(isLoading) {
        convertButton.disabled = isLoading;
        convertButton.textContent = isLoading ? "인식 중..." : "인식 후 편집하기";
      }

      function setStatus(message, isError = false) {
        statusText.textContent = message;
        statusText.classList.toggle("error", isError);
      }

      resetCanvas();
    </script>
  </body>
</html>
